name: Release Notes

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-notes:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Find latest release tag
        id: tag
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ -z "$TAG" ]; then
            echo "No release found, skipping"
            exit 0
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "Found release: $TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and update release notes
        if: steps.tag.outputs.tag_name
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG_NAME^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release, using full history"
            COMMITS=$(git log "$TAG_NAME" --oneline)
            STAT=$(git diff --stat "$TAG_NAME")
          else
            COMMITS=$(git log "$PREV_TAG".."$TAG_NAME" --oneline)
            STAT=$(git diff --stat "$PREV_TAG".."$TAG_NAME")
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -i "^[a-f0-9]* feat" || true)
          FIXES=$(echo "$COMMITS" | grep -i "^[a-f0-9]* fix" || true)
          PERF=$(echo "$COMMITS" | grep -i "^[a-f0-9]* perf" || true)
          BREAKING=$(echo "$COMMITS" | grep -i "BREAKING\|removed\|remove" || true)

          # Build release notes
          {
            echo "## What's New"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES" | sed 's/^[a-f0-9]* feat[:(]*/- /' | sed 's/):/: /'
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^[a-f0-9]* fix[:(]*/- /' | sed 's/):/: /'
              echo ""
            fi
            if [ -n "$PERF" ]; then
              echo "### Performance"
              echo "$PERF" | sed 's/^[a-f0-9]* perf[:(]*/- /' | sed 's/):/: /'
              echo ""
            fi
            if [ -n "$BREAKING" ]; then
              echo "### Breaking Changes"
              echo "$BREAKING" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi
            echo "---"
            echo ""
            echo "**Full changelog**: [$PREV_TAG...$TAG_NAME](https://github.com/$GITHUB_REPOSITORY/compare/$PREV_TAG...$TAG_NAME)"
          } > release-notes.md

          echo "Generated release notes:"
          cat release-notes.md

          gh release edit "$TAG_NAME" --notes-file release-notes.md
          echo "Updated release $TAG_NAME"
