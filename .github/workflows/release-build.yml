name: Release Build

permissions:
  contents: write
  id-token: write

on:
  release:
    # `created` fires on draft creation (release-please v5 creates drafts) so
    # binaries get pre-built and attached to the draft for review before the
    # release goes live to users.
    # `released` fires when a draft is promoted to published (or a release is
    # created already-published) — that's when crates.io publish should run.
    # Per-job `if:` gates below split which event triggers which job.
    types: [created, released]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  publish-crate:
    # Only run when the release is actually published, not on draft creation.
    # crates.io publishes are immutable; we never want to fire this for a
    # draft that might be deleted.
    if: github.event.action == 'released'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

  build-binaries:
    # Run on draft creation so the artifacts are attached before the release
    # is published. Skip on `released` to avoid rebuilding the same artifacts
    # when a draft is promoted.
    if: github.event.action == 'created'
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      # mimalloc has C source that needs a musl-targeted C compiler when
      # building for x86_64-unknown-linux-musl. ubuntu-latest doesn't ship
      # musl-tools by default; install it before the upload action runs
      # `cargo build`. No untrusted input is interpolated — `matrix.target`
      # is a static config value, and the run: command is a literal.
      - name: Install musl cross-compile toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: lessence
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          checksum: sha256
          ref: refs/tags/${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
