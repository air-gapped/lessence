name: Release

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: rust

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@0e34102c043ded9f2ca39f7af5cd99a540c61aff # v1
        with:
          bin: lessence
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          checksum: sha256
          ref: refs/tags/${{ needs.release-please.outputs.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: anthropics/claude-code-action@bee87b3258c251f9279e5371b0cc3660f37f3f77 # v1
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools 'Bash(gh:*),Bash(git:*),Read,Glob,Grep'"
          prompt: |
            Generate user-facing release notes for lessence tag $TAG_NAME.

            Steps:
            1. Run: git log $(git describe --tags --abbrev=0 $TAG_NAME^)...$TAG_NAME --oneline
            2. Run: git diff $(git describe --tags --abbrev=0 $TAG_NAME^)...$TAG_NAME --stat
            3. Read CHANGELOG.md for the mechanical changelog

            Write release notes following these rules:
            - Audience: users and AI agents, not contributors
            - Each entry explains the USER BENEFIT, not the implementation
            - Group into: Features, Improvements, Bug Fixes, Breaking Changes (only non-empty sections)
            - Reference PR numbers where available
            - Do NOT include: dependency bumps, CI config changes, internal refactors, chore commits
            - Do NOT use generic filler phrases like "exciting new features" or "we're thrilled"
            - Be specific and factual. Base notes ONLY on the commits and diff. Do not speculate.
            - Keep it concise: aim for 10-30 lines total

            Write the notes to a file called release-notes.md, then run:
            gh release edit "$TAG_NAME" --notes-file release-notes.md
