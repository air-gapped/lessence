name: Release

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
        with:
          release-type: rust

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@0e34102c043ded9f2ca39f7af5cd99a540c61aff # v1
        with:
          bin: lessence
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: anthropics/claude-code-action@725b9c36f61150e9be5b9ec02289a9a0cfc21c04 # v1
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Generate user-facing release notes for lessence tag $TAG_NAME.

            Steps:
            1. Run: git log $(git describe --tags --abbrev=0 $TAG_NAME^)...$TAG_NAME --oneline
            2. Run: git diff $(git describe --tags --abbrev=0 $TAG_NAME^)...$TAG_NAME --stat
            3. Read CHANGELOG.md for the mechanical changelog

            Write release notes following these rules:
            - Audience: users and AI agents, not contributors
            - Each entry explains the USER BENEFIT, not the implementation
            - Group into: Features, Improvements, Bug Fixes, Breaking Changes (only non-empty sections)
            - Reference PR numbers where available
            - Do NOT include: dependency bumps, CI config changes, internal refactors, chore commits
            - Do NOT use generic filler phrases like "exciting new features" or "we're thrilled"
            - Be specific and factual. Base notes ONLY on the commits and diff. Do not speculate.
            - Keep it concise: aim for 10-30 lines total

            After generating, run:
            gh release edit "$TAG_NAME" --notes-file /dev/stdin <<< "GENERATED_NOTES"

            Replace GENERATED_NOTES with the actual notes you generated.
